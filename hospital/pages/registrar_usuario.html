<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrar Usuario</title>
    <link rel="stylesheet" href="../../css/cssindex.css">
</head>

<body>
    <header>
        <h1>Gestión de Usuarios</h1>
    </header>

    <main>
        <section class="card">
            <h2>Formulario de Usuario</h2>
            <form id="user-form">
                <div class="form-grid">
                    <label for="nombre">Nombre completo</label>
                    <input type="text" id="nombre" required>

                    <label for="email">Correo electrónico</label>
                    <input type="email" id="email" required>

                    <label for="rol">Rol</label>
                    <select id="rol" required>
                        <option value="">Selecciona un rol</option>
                        <option value="Administrador">Administrador</option>
                        <option value="Enfermería">Enfermería</option>
                        <option value="Recepción">Recepción</option>
                        <option value="Doctor">Doctor</option>
                    </select>

                    <label for="usuario">Usuario</label>
                    <input type="text" id="usuario" required>

                    <label for="password">Contraseña</label>
                    <input type="password" id="password" required>
                </div>

                <div class="button-row">
                    <button type="submit" class="button">Guardar</button>
                    <button id="cancel-button" class="button secondary">Cancelar</button>
                </div>
                <div id="form-message" class="message" style="display:none;"></div>
            </form>
        </section>

        <section class="card table-card">
            <h2>Usuarios registrados</h2>
            <div class="table-wrapper">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>Nombre</th>
                            <th>Email</th>
                            <th>Rol</th>
                            <th>Usuario</th>
                            <th>Contraseña</th>
                            <th>Acciones</th>
                        </tr>
                    </thead>
                    <tbody id="users-body"></tbody>
                </table>
            </div>
        </section>
    </main>

    <footer>
        <a href="../index.html" class="button secondary">Volver al login</a>
    </footer>

    <script src="../scripts/crud_usuarios.js"></script>
</body>

</html>
