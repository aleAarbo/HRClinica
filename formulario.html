<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Validación de Formulario</title>
    <link rel="stylesheet" href="estilosF.css">
</head>
<body>
    <header>
        <h1>Validación de Formulario en JS</h1>
    </header>

    <main>
        <form>

            <label for="nombre">Nomres:</label>
            <input type="text" id="nombre">

            <label for="apellido">Apellidos:</label>
            <input type="text" id="apellido">

            <label for="nacimiento">Fecha de Nacimiento:</label>
            <input type="date" id="nacimiento">

            <label for="edad">Edad:</label>
            <input type="number" id="edad" disabled>


            <input type="submit" value="Aceptar" id="aceptar">
        </form>
        
    </main>
    
    <footer>
        <p>Ejemplo de Validación para Formulario en JS - ITSP</p>
    </footer>
    <script src="validacion.js"></script>
</body>
</html>
