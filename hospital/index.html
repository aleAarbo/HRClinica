<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Página Principal</title>
    <link rel="stylesheet" href="styles/cssindex.css">
</head>

<body>
    <header>
        <h1>Inicio de Sesión</h1>
    </header>

    <main>
        <form id="login-form">
            <label for="usuario">Usuario:</label>
            <input type="text" id="usuario" autocomplete="username" required>

            <label for="contrasenia">Contraseña:</label>
            <input type="password" id="contrasenia" autocomplete="current-password" required>

            <input type="submit" value="Ingresar" id="ingresar">
            <div id="login-message" class="message" style="display:none;"></div>
        </form>
    </main>

    <script src="scripts/login.js"></script>
</body>

</html>
